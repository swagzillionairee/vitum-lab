# CI gate: type-check (client + api tsconfigs) and the Vitest suite must pass
# before a PR merges. The Vercel deploy only proves the client bundle compiles —
# without this, regressions in pricing, the cart reducer, or order-lifecycle
# logic could ship with every visible check green.
name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # No version key — pnpm/action-setup reads the packageManager field in
      # package.json (pinning both makes the action refuse to run).
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check (client + serverless)
        run: pnpm check

      - name: Unit & component tests
        run: pnpm test
